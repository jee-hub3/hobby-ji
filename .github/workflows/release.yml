name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      # nsis와 portable을 한 번에 publish하면 electron-builder가 두 타겟에서
      # 동시에 "release가 아직 없다"고 판단해 중복 Draft 릴리스를 만드는 버그가
      # 있다. 순차 실행하면 두 번째 호출이 첫 번째가 만든 release를 재사용한다.
      - name: Build and publish (nsis)
        run: npm run build -- --win nsis --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish (portable)
        run: npm run build -- --win portable --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
